<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장비 목록</title>

  <link rel="stylesheet" href="assets/css/common.css" />
  <link rel="stylesheet" href="assets/css/equipment.css" />
</head>
<body>
  <div class="page-shell">
    <header class="page-header">
      <div>
        <p class="page-eyebrow">의료장비 관리시스템</p>
        <h1 class="page-title" id="listPageTitle">장비 목록</h1>
        <p class="page-desc" id="listPageDesc">장비번호, 장비명, 모델명, 부서, 상태 기준으로 빠르게 검색할 수 있습니다.</p>
        <span class="context-chip is-hidden" id="listContextChip"></span>
      </div>

      <nav class="page-nav">
        <a href="equipment-dashboard.html">대시보드</a>
        <a href="equipment-form.html" class="js-create-equipment-btn">장비등록</a>
      </nav>
    </header>

    <main class="list-layout">
      <section class="dashboard-panel">
        <div class="section-heading">
          <div>
            <h2>장비 검색</h2>
            <p>검색어와 조건을 조합해 원하는 장비를 찾으세요.</p>
          </div>
          <div class="result-count-text" id="resultCountText">조회 기준 총 0건</div>
        </div>

        <div class="search-form-grid">
          <div class="form-field">
            <label for="keyword">검색어</label>
            <input type="text" id="keyword" placeholder="장비번호, 장비명, 모델명, 시리얼번호" />
          </div>

          <div class="form-field">
            <label for="department">사용부서</label>
            <input type="text" id="department" placeholder="예: 영상의학과" />
          </div>

          <div class="form-field">
            <label for="status">상태</label>
            <select id="status">
              <option value="">전체 상태</option>
              <option value="IN_USE">사용중</option>
              <option value="REPAIRING">수리중</option>
              <option value="INSPECTING">점검중</option>
              <option value="STORED">보관</option>
              <option value="DISPOSED">폐기</option>
            </select>
          </div>

          <div class="form-field">
            <label for="manufacturer">제조사</label>
            <input type="text" id="manufacturer" placeholder="제조사 입력" />
          </div>
        </div>

        <div class="chip-filter-row">
          <span class="chip-filter-label">빠른 상태 선택</span>
          <button type="button" class="filter-chip active" data-status="">전체</button>
          <button type="button" class="filter-chip" data-status="IN_USE">사용중</button>
          <button type="button" class="filter-chip" data-status="REPAIRING">수리중</button>
          <button type="button" class="filter-chip" data-status="INSPECTING">점검중</button>
          <button type="button" class="filter-chip" data-status="STORED">보관</button>
        </div>

        <div class="action-row">
          <button type="button" id="searchBtn">조회</button>
          <button type="button" id="resetBtn" class="btn-secondary">초기화</button>
        </div>
      </section>

      <section class="summary-row is-hidden" id="summaryRow">
        <article class="summary-card">
          <div class="summary-card__label">전체</div>
          <div class="summary-card__value" id="summaryTotal">0</div>
        </article>

        <article class="summary-card">
          <div class="summary-card__label">사용중</div>
          <div class="summary-card__value" id="summaryInUse">0</div>
        </article>

        <article class="summary-card">
          <div class="summary-card__label">수리중</div>
          <div class="summary-card__value" id="summaryRepairing">0</div>
        </article>

        <article class="summary-card">
          <div class="summary-card__label">점검중</div>
          <div class="summary-card__value" id="summaryInspecting">0</div>
        </article>
      </section>

      <section class="dashboard-panel is-hidden" id="resultSection">
        <div class="section-heading">
          <div>
            <h2>조회 결과</h2>
            <p>카드를 눌러 장비 상세 화면으로 이동할 수 있습니다.</p>
          </div>
          <div class="hero-result-badge is-hidden" id="heroResultBadge">검색 완료</div>
        </div>

        <div class="equipment-card-list" id="equipmentCardList">
          <div class="empty-state">
            <strong>검색 조건을 설정한 뒤 조회해 주세요.</strong>
            <p>조회 전에는 결과 영역이 표시되지 않습니다.</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/app-permission.js"></script>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/equipment-list.js"></script>
</body>
</html>
