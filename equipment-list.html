<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장비 목록</title>
  <link rel="stylesheet" href="assets/css/common.css" />
</head>
<body>
  <div class="container app-shell equipment-list-shell">
    <section class="top-brand-bar">
      <div class="top-brand-left">
        <div class="top-brand-logo">+</div>
        <div class="top-brand-texts">
          <strong class="top-brand-title">의료장비 관리시스템</strong>
          <span class="top-brand-sub">장비 검색 · 상태 조회 · 상세 확인</span>
        </div>
      </div>

      <div class="top-brand-actions">
        <a class="nav-link" href="index.html">대시보드</a>
        <a class="nav-link btn-primary" href="equipment-form.html">장비등록</a>
      </div>
    </section>

    <section class="hero-panel equipment-list-hero">
      <div class="hero-copy">
        <h1 class="page-title hero-title" id="listPageTitle">장비 목록</h1>
        <div class="hero-subtext" id="listPageDesc">
          장비번호, 장비명, 모델명, 부서, 상태 기준으로 빠르게 검색할 수 있습니다.
        </div>
        <div id="listContextChip" class="list-context-chip is-hidden"></div>
      </div>
      <div class="equipment-list-hero-badge is-hidden" id="heroResultBadge">
        <span class="equipment-list-hero-badge-label">조회 기준</span>
        <strong class="equipment-list-hero-badge-value" id="resultCountText">총 0건</strong>
      </div>
    </section>

    <div id="messageBox" class="message-box"></div>

    <section class="card equipment-search-card equipment-search-card-tuned">
      <div class="section-head">
        <h2 class="section-title">장비 검색</h2>
        <div class="sub-text">검색어와 조건을 조합해 원하는 장비를 찾으세요.</div>
      </div>

      <div class="equipment-search-grid equipment-search-grid-tuned">
        <div class="form-group equipment-search-main">
          <label class="form-label" for="keyword">검색어</label>
          <input
            type="text"
            id="keyword"
            class="form-input search-input-lg"
            placeholder="장비번호 / 장비명 / 모델명 / 시리얼번호"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="department">사용부서</label>
          <input
            type="text"
            id="department"
            class="form-input"
            placeholder="예: 검진팀"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="status">상태</label>
          <select id="status" class="form-select">
            <option value="">전체 상태</option>
            <option value="IN_USE">사용중</option>
            <option value="REPAIRING">수리중</option>
            <option value="INSPECTING">점검중</option>
            <option value="STORED">보관</option>
            <option value="DISPOSED">폐기</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="manufacturer">제조사</label>
          <input
            type="text"
            id="manufacturer"
            class="form-input"
            placeholder="예: GE"
          />
        </div>
      </div>

      <div class="search-filter-block">
        <div class="search-block-label">빠른 상태 선택</div>
        <div class="search-chip-row">
          <button type="button" class="filter-chip" data-status="">전체</button>
          <button type="button" class="filter-chip" data-status="IN_USE">사용중</button>
          <button type="button" class="filter-chip" data-status="REPAIRING">수리중</button>
          <button type="button" class="filter-chip" data-status="INSPECTING">점검중</button>
          <button type="button" class="filter-chip" data-status="STORED">보관</button>
        </div>
      </div>
      
      <div class="search-action-block">
        <div class="search-block-label">실행</div>
        <div class="form-actions equipment-search-actions">
          <button class="btn btn-primary search-submit-btn" id="searchBtn">조회</button>
          <button class="btn" id="resetBtn">초기화</button>
        </div>
      </div>
    </section>

    <section class="equipment-summary-row equipment-summary-row-tuned is-hidden" id="summaryRow">
      <div class="summary-pill">
        <span class="summary-pill-label">전체</span>
        <strong class="summary-pill-value" id="summaryTotal">0</strong>
      </div>
    
      <div class="summary-pill">
        <span class="summary-pill-label">사용중</span>
        <strong class="summary-pill-value" id="summaryInUse">0</strong>
      </div>
    
      <div class="summary-pill">
        <span class="summary-pill-label">수리중</span>
        <strong class="summary-pill-value" id="summaryRepairing">0</strong>
      </div>
    
      <div class="summary-pill">
        <span class="summary-pill-label">점검중</span>
        <strong class="summary-pill-value" id="summaryInspecting">0</strong>
      </div>
    </section>
    
    <section class="equipment-list-section is-hidden" id="resultSection">
      <div class="section-head">
        <h2 class="section-title">조회 결과</h2>
        <div class="sub-text">카드를 눌러 장비 상세 화면으로 이동할 수 있습니다.</div>
      </div>
    
      <div id="equipmentCardList" class="equipment-card-list equipment-card-list-tuned">
        <div class="empty-state">
          <div class="empty-state-title">검색 조건을 설정한 뒤 조회해 주세요.</div>
          <div class="empty-state-desc">조회 전에는 결과 영역이 표시되지 않습니다.</div>
        </div>
      </div>
    </section>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    window.auth.requireAuth();
  </script>  
  <script src="assets/js/api.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/equipment-list.js"></script>

  <div id="globalLoading" class="global-loading">
    <div class="spinner"></div>
</body>
</html>
