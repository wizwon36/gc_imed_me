<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사용자 관리</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <style>
    body {
      margin: 0;
      background: #f5f7fb;
      color: #0f172a;
    }

    .admin-shell {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .admin-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
      padding: 18px 20px;
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 20px;
      background: #fff;
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.05);
    }

    .admin-title {
      margin: 0;
      font-size: 26px;
      line-height: 1.25;
    }

    .admin-desc {
      margin: 6px 0 0;
      font-size: 14px;
      color: #667085;
    }

    .admin-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .admin-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border: 1px solid #d0d5dd;
      border-radius: 12px;
      background: #fff;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }

    .admin-btn.primary {
      background: #0b1b46;
      color: #fff;
      border-color: #0b1b46;
    }

    .admin-btn.secondary {
      background: #eef2ff;
      color: #1d4ed8;
      border-color: #c7d2fe;
    }

    .admin-grid {
      display: grid;
      grid-template-columns: minmax(560px, 1.5fr) minmax(300px, 0.8fr);
      gap: 16px;
      align-items: start;
    }

    .admin-card {
      padding: 20px;
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 20px;
      background: #fff;
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.05);
      min-width: 0;
    }

    .admin-card h2 {
      margin: 0 0 6px;
      font-size: 18px;
    }

    .admin-card p {
      margin: 0 0 16px;
      font-size: 13px;
      color: #667085;
    }

    .admin-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .admin-field {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .admin-field.full {
      grid-column: 1 / -1;
    }

    .admin-field label {
      font-size: 13px;
      font-weight: 800;
      color: #344054;
    }

    .admin-field input,
    .admin-field select {
      width: 100%;
      min-height: 48px;
      padding: 0 14px;
      border: 1px solid #d0d5dd;
      border-radius: 14px;
      font-size: 14px;
      box-sizing: border-box;
      background: #fff;
    }

    .admin-input-hint {
      font-size: 12px;
      color: #667085;
      margin-top: -2px;
      line-height: 1.5;
    }

    .permission-box {
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 1px solid #e4e7ec;
      border-radius: 14px;
      background: #f8fafc;
    }

    .permission-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 180px;
      gap: 12px;
      align-items: center;
    }

    .permission-row span {
      display: flex;
      align-items: center;
      min-height: 44px;
      font-size: 14px;
      font-weight: 700;
      color: #344054;
      line-height: 1.4;
      word-break: keep-all;
    }

    .permission-row select {
      width: 100%;
      min-width: 0;
      min-height: 44px;
    }

    .admin-submit-wrap {
      grid-column: 1 / -1;
      display: grid;
      gap: 10px;
    }

    .admin-submit-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .admin-submit-actions .admin-btn {
      flex: 1;
      min-height: 52px;
      border-radius: 16px;
      font-size: 15px;
    }

    .message-box {
      min-height: 20px;
      font-size: 13px;
      line-height: 1.5;
    }

    .message-box.error {
      color: #b42318;
    }

    .message-box.success {
      color: #027a48;
    }

    .user-list {
      display: grid;
      gap: 10px;
    }

    .user-item {
      padding: 14px;
      border: 1px solid #e4e7ec;
      border-radius: 14px;
      background: #fff;
    }

    .user-item-top {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .user-item strong {
      display: block;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .user-item span {
      display: block;
      font-size: 12px;
      color: #667085;
      line-height: 1.5;
    }

    .user-item-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .user-item-actions .admin-btn {
      min-height: 36px;
      padding: 0 12px;
      border-radius: 10px;
      font-size: 13px;
    }

    #globalLoading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.22);
      backdrop-filter: blur(2px);
    }

    #globalLoading.is-open {
      display: flex;
    }

    .global-loading__dialog {
      min-width: 200px;
      max-width: calc(100vw - 48px);
      padding: 20px 24px;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.18);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .global-loading__spinner {
      width: 24px;
      height: 24px;
      border: 3px solid #d0d5dd;
      border-top-color: #0b1b46;
      border-radius: 50%;
      animation: globalLoadingSpin 0.8s linear infinite;
      flex: 0 0 auto;
    }

    .global-loading__text {
      font-size: 14px;
      font-weight: 700;
      color: #0f172a;
    }

    .admin-btn.warning {
      background: #fff7ed;
      color: #c2410c;
      border-color: #fdba74;
    }
    
    .admin-btn.danger {
      background: #fef2f2;
      color: #b42318;
      border-color: #fecaca;
    }
    
    .admin-btn.success {
      background: #ecfdf3;
      color: #027a48;
      border-color: #abefc6;
    }
    
    @keyframes globalLoadingSpin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 900px) {
      .admin-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .admin-topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .admin-actions {
        width: 100%;
      }

      .admin-actions .admin-btn {
        flex: 1;
      }

      .admin-form-grid {
        grid-template-columns: 1fr;
      }

      .admin-field.full,
      .admin-submit-wrap {
        grid-column: auto;
      }

      .permission-row {
        grid-template-columns: 1fr;
      }

      .admin-submit-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="admin-shell">
    <section class="admin-topbar">
      <div>
        <h1 class="admin-title">사용자 관리</h1>
        <p class="admin-desc">사용자 등록, 수정, 앱별 권한 관리를 진행합니다.</p>
      </div>
      <div class="admin-actions">
        <button class="admin-btn" type="button" onclick="location.href='../../portal.html'">포털로</button>
        <button class="admin-btn" type="button" id="logoutBtn">로그아웃</button>
      </div>
    </section>

    <section class="admin-grid">
      <div class="admin-card">
        <h2 id="formTitle">사용자 등록</h2>
        <p id="formDesc">신규 사용자를 등록하고 앱별 권한을 부여합니다.</p>

        <div class="admin-form-grid">
          <div class="admin-field">
            <label for="userEmail">이메일</label>
            <input type="email" id="userEmail" placeholder="example@hospital.com">
          </div>

          <div class="admin-field">
            <label for="userName">이름</label>
            <input type="text" id="userName" placeholder="사용자 이름">
          </div>

          <div class="admin-field">
            <label for="department">부서</label>
            <input type="text" id="department" placeholder="예: 운영팀">
          </div>

          <div class="admin-field">
            <label for="phone">연락처</label>
            <input type="text" id="phone" placeholder="예: 010-0000-0000">
          </div>

          <div class="admin-field">
            <label for="globalRole">기본 역할</label>
            <select id="globalRole">
              <option value="user">user</option>
              <option value="manager">manager</option>
              <option value="admin">admin</option>
            </select>
          </div>

          <div class="admin-field">
            <label for="userActive">사용 여부</label>
            <select id="userActive">
              <option value="Y">Y</option>
              <option value="N">N</option>
            </select>
          </div>

          <div class="admin-field full">
            <label>초기 비밀번호</label>
            <div class="admin-input-hint" id="passwordHint">
              신규 사용자는 초기 비밀번호 <strong>1111</strong>로 등록되며, 첫 로그인 후 변경하도록 안내됩니다.
            </div>
          </div>

          <div class="admin-field full">
            <label>앱별 권한</label>
            <div class="admin-input-hint">권한을 선택한 앱만 저장됩니다.</div>

            <div class="permission-box">
              <div class="permission-row">
                <span>의료장비 관리</span>
                <select data-app-id="equipment" class="app-permission">
                  <option value="">권한 없음</option>
                  <option value="view">view</option>
                  <option value="edit">edit</option>
                  <option value="admin">admin</option>
                </select>
              </div>

              <div class="permission-row">
                <span>시스템 로그</span>
                <select data-app-id="logs" class="app-permission">
                  <option value="">권한 없음</option>
                  <option value="view">view</option>
                  <option value="edit">edit</option>
                  <option value="admin">admin</option>
                </select>
              </div>

              <div class="permission-row">
                <span>사용자 관리</span>
                <select data-app-id="users_admin" class="app-permission">
                  <option value="">권한 없음</option>
                  <option value="view">view</option>
                  <option value="edit">edit</option>
                  <option value="admin">admin</option>
                </select>
              </div>
            </div>
          </div>

          <div class="admin-submit-wrap">
            <div class="admin-submit-actions">
              <button type="button" class="admin-btn primary" id="saveUserBtn">사용자 등록</button>
              <button type="button" class="admin-btn secondary" id="cancelEditBtn" style="display:none;">수정 취소</button>
            </div>
            <div id="adminUserMessage" class="message-box"></div>
          </div>
        </div>
      </div>

      <div class="admin-card user-list-card">
        <h2>등록 사용자</h2>
        <p>등록된 사용자를 선택해서 수정할 수 있습니다.</p>
        <div id="userList" class="user-list"></div>
      </div>
    </section>
  </main>

  <div id="globalLoading" aria-hidden="true">
    <div class="global-loading__dialog" role="status" aria-live="polite">
      <div class="global-loading__spinner" aria-hidden="true"></div>
      <div class="global-loading__text" id="globalLoadingText">처리 중...</div>
    </div>
  </div>

  <script src="../../assets/js/core/config.js"></script>
  <script src="../../assets/js/core/api.js"></script>
  <script src="../../assets/js/core/auth.js"></script>
  <script src="../../assets/js/admin/admin-users.js"></script>
</body>
</html>
