<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사용자 관리</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <style>
    body {
      margin: 0;
      background: #f5f7fb;
      color: #0f172a;
    }

    .admin-shell {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .admin-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
      padding: 18px 20px;
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 20px;
      background: #fff;
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.05);
    }

    .admin-title {
      margin: 0;
      font-size: 26px;
      line-height: 1.25;
    }

    .admin-desc {
      margin: 6px 0 0;
      font-size: 14px;
      color: #667085;
    }

    .admin-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .admin-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border: 1px solid #d0d5dd;
      border-radius: 12px;
      background: #fff;
      font-weight: 800;
      cursor: pointer;
    }

    .admin-btn.primary {
      background: #0b1b46;
      color: #fff;
      border-color: #0b1b46;
    }

    .admin-grid {
      display: grid;
      grid-template-columns: minmax(560px, 1.5fr) minmax(300px, 0.8fr);
      gap: 16px;
      align-items: start;
    }

    .admin-card {
      padding: 20px;
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 20px;
      background: #fff;
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.05);
      min-width: 0;
    }

    .admin-card h2 {
      margin: 0 0 6px;
      font-size: 18px;
    }

    .admin-card p {
      margin: 0 0 16px;
      font-size: 13px;
      color: #667085;
    }

    .admin-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .admin-field {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .admin-field.full {
      grid-column: 1 / -1;
    }

    .admin-field label {
      font-size: 13px;
      font-weight: 800;
      color: #344054;
    }

    .admin-field input,
    .admin-field select {
      width: 100%;
      min-height: 48px;
      padding: 0 14px;
      border: 1px solid #d0d5dd;
      border-radius: 14px;
      font-size: 14px;
      box-sizing: border-box;
      background: #fff;
    }

    .admin-input-hint {
      font-size: 12px;
      color: #667085;
      margin-top: -2px;
    }

    .permission-box {
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 1px solid #e4e7ec;
      border-radius: 14px;
      background: #f8fafc;
    }

    .permission-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 180px;
      gap: 12px;
      align-items: center;
    }
    
    .permission-row span {
      display: flex;
      align-items: center;
      min-height: 44px;
      font-size: 14px;
      font-weight: 700;
      color: #344054;
      line-height: 1.4;
      word-break: keep-all;
    }
    
    .permission-row select {
      width: 100%;
      min-height: 44px;
    }

    .admin-submit-wrap {
      grid-column: 1 / -1;
      display: grid;
      gap: 10px;
    }

    .admin-submit-wrap .admin-btn {
      width: 100%;
      min-height: 52px;
      border-radius: 16px;
      font-size: 15px;
    }

    .message-box {
      min-height: 20px;
      font-size: 13px;
    }

    .message-box.error {
      color: #b42318;
    }

    .message-box.success {
      color: #027a48;
    }

    .user-list {
      display: grid;
      gap: 10px;
    }

    .user-item {
      padding: 14px;
      border: 1px solid #e4e7ec;
      border-radius: 14px;
      background: #fff;
    }

    .user-item strong {
      display: block;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .user-item span {
      display: block;
      font-size: 12px;
      color: #667085;
      line-height: 1.5;
    }

    @media (max-width: 900px) {
      .admin-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .admin-topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .admin-actions {
        width: 100%;
      }

      .admin-actions .admin-btn {
        flex: 1;
      }

      .admin-form-grid {
        grid-template-columns: 1fr;
      }

      .admin-field.full,
      .admin-submit-wrap {
        grid-column: auto;
      }

      .permission-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="admin-shell">
    <section class="admin-topbar">
      <div>
        <h1 class="admin-title">사용자 관리</h1>
        <p class="admin-desc">사용자 등록과 앱별 권한을 관리합니다.</p>
      </div>
      <div class="admin-actions">
        <button class="admin-btn" type="button" onclick="location.href='../../portal.html'">HOME</button>
        <button class="admin-btn" type="button" id="logoutBtn">로그아웃</button>
      </div>
    </section>

    <section class="admin-grid">
      <div class="admin-card">
        <h2>사용자 등록</h2>
        <p>신규 사용자를 등록하고 앱별 권한을 부여합니다.</p>

        <div class="admin-form-grid">
          <div class="admin-field">
            <label for="userEmail">이메일</label>
            <input type="email" id="userEmail" placeholder="example@hospital.com">
          </div>

          <div class="admin-field">
            <label for="userName">이름</label>
            <input type="text" id="userName" placeholder="사용자 이름">
          </div>

          <div class="admin-field">
            <label for="department">부서</label>
            <input type="text" id="department" placeholder="예: 운영팀">
          </div>

          <div class="admin-field">
            <label for="phone">연락처</label>
            <input type="text" id="phone" placeholder="예: 010-0000-0000">
          </div>

          <div class="admin-field full">
            <label for="globalRole">기본 역할</label>
            <select id="globalRole">
              <option value="user">user</option>
              <option value="manager">manager</option>
              <option value="admin">admin</option>
            </select>
          </div>

          <div class="admin-field full">
            <label>초기 비밀번호</label>
            <div class="admin-input-hint">신규 사용자는 초기 비밀번호 <strong>1111</strong>로 등록되며, 첫 로그인 후 변경하도록 안내됩니다.</div>
          </div>

          <div class="admin-field full">
            <label>앱별 권한</label>
            <div class="permission-box">
              <div class="permission-row">
                <span>의료장비 관리</span>
                <select data-app-id="equipment" class="app-permission">
                  <option value="">권한 없음</option>
                  <option value="view">view</option>
                  <option value="edit">edit</option>
                  <option value="admin">admin</option>
                </select>
                <select data-app-id="equipment" class="app-active">
                  <option value="Y">Y</option>
                  <option value="N">N</option>
                </select>
              </div>

              <div class="permission-row">
                <span>시스템 로그</span>
                <select data-app-id="logs" class="app-permission">
                  <option value="">권한 없음</option>
                  <option value="view">view</option>
                  <option value="edit">edit</option>
                  <option value="admin">admin</option>
                </select>
                <select data-app-id="logs" class="app-active">
                  <option value="Y">Y</option>
                  <option value="N">N</option>
                </select>
              </div>

              <div class="permission-row">
                <span>사용자 관리</span>
                <select data-app-id="users_admin" class="app-permission">
                  <option value="">권한 없음</option>
                  <option value="view">view</option>
                  <option value="edit">edit</option>
                  <option value="admin">admin</option>
                </select>
                <select data-app-id="users_admin" class="app-active">
                  <option value="Y">Y</option>
                  <option value="N">N</option>
                </select>
              </div>
            </div>
          </div>

          <div class="admin-submit-wrap">
            <button type="button" class="admin-btn primary" id="createUserBtn">사용자 등록</button>
            <div id="adminUserMessage" class="message-box"></div>
          </div>
        </div>
      </div>

      <div class="admin-card">
        <h2>등록 사용자</h2>
        <p>최근 사용자 목록입니다.</p>
        <div id="userList" class="user-list"></div>
      </div>
    </section>
  </main>

  <script src="../../assets/js/core/config.js"></script>
  <script src="../../assets/js/core/api.js"></script>
  <script src="../../assets/js/core/auth.js"></script>
  <script src="../../assets/js/admin/admin-users.js"></script>
</body>
</html>
