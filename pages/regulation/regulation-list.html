<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>규정 및 가이드라인</title>
  <link rel="stylesheet" href="../../assets/css/common.css" />
  <style>
    /* 규정 카드 그리드 */
    .reg-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .reg-card {
      display: flex;
      flex-direction: column;
      gap: 0;
      border-radius: var(--radius-xl);
      border: 1.5px solid var(--border-card);
      background: #fff;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: box-shadow .15s, border-color .15s;
      cursor: pointer;
    }
    .reg-card:hover {
      border-color: #93c5fd;
      box-shadow: 0 4px 16px rgba(37,99,235,.10);
    }

    /* 카드 상단 — 이름 + 아이콘 */
    .reg-card-head {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 18px 12px;
      border-bottom: 1px solid #f1f5f9;
    }
    .reg-card-icon {
      font-size: 22px;
      flex-shrink: 0;
    }
    .reg-card-title {
      font-size: 15px;
      font-weight: 800;
      color: var(--text-primary);
    }
    .reg-card-desc {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* 카드 하단 — 메타 정보 */
    .reg-card-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      padding: 12px 18px 14px;
    }
    .reg-meta-item { display: flex; flex-direction: column; gap: 3px; padding: 4px 0; }
    .reg-meta-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .reg-meta-value {
      font-size: 12px;
      color: var(--text-primary);
      font-weight: 600;
    }
    .reg-meta-value--badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 800;
      background: #dcfce7;
      color: #15803d;
      border: 1px solid #86efac;
    }
    .reg-meta-value--muted { color: var(--text-muted); font-weight: 400; }

    /* 스켈레톤 */
    .reg-skeleton-card {
      height: 160px;
      border-radius: var(--radius-xl);
      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .reg-empty {
      text-align: center; padding: 60px 20px;
      color: var(--text-muted); font-size: 14px;
    }

    /* 섹션 타이틀 */
    .reg-section-label {
      font-size: 12px; font-weight: 700;
      color: var(--text-muted); letter-spacing: .06em;
      text-transform: uppercase; margin-bottom: 14px;
    }

    /* ── 권한 관리 섹션 ── */
    .reg-perm-section {
      margin-top: 40px; padding-top: 32px;
      border-top: 2px solid #f1f5f9;
    }
    .reg-perm-header { margin-bottom: 20px; }
    .reg-perm-title { font-size: 15px; font-weight: 800; color: var(--text-primary); }
    .reg-perm-desc  { font-size: 13px; color: var(--text-muted); margin-top: 3px; }

    .reg-perm-table {
      width: 100%; border-collapse: collapse;
      border-radius: 12px; overflow: hidden;
      border: 1px solid var(--border-soft);
    }
    .reg-perm-table th {
      background: #f8fafc; padding: 10px 16px;
      font-size: 12px; font-weight: 700; color: var(--text-muted);
      text-align: left; border-bottom: 1.5px solid var(--border-soft);
    }
    .reg-perm-table td {
      padding: 12px 16px; font-size: 13px;
      color: var(--text-primary); border-bottom: 1px solid #f1f5f9;
      vertical-align: top;
    }
    .reg-perm-table tr:last-child td { border-bottom: none; }

    .reg-perm-app-row { display: flex; align-items: center; gap: 8px; }
    .reg-perm-app-icon { font-size: 18px; }

    .reg-perm-user-list { display: flex; flex-direction: column; gap: 6px; }
    .reg-perm-user-item {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 10px; background: #f8fafc;
      border-radius: 8px; border: 1px solid #e2e8f0;
    }
    .reg-perm-user-email { font-size: 12px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .reg-perm-badge {
      font-size: 11px; font-weight: 700; padding: 2px 8px;
      border-radius: 20px; background: #dcfce7; color: #15803d;
      border: 1px solid #86efac; white-space: nowrap;
    }
    .reg-perm-remove {
      background: none; border: none; cursor: pointer;
      color: #94a3b8; font-size: 13px; padding: 2px 4px;
      border-radius: 4px; flex-shrink: 0; font-family: inherit;
    }
    .reg-perm-remove:hover { color: #dc2626; }
    .reg-perm-add {
      font-size: 12px; padding: 4px 10px; border-radius: 7px;
      border: 1.5px dashed #cbd5e1; background: #fff;
      color: var(--text-muted); cursor: pointer;
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 6px; font-family: inherit; transition: all .12s;
    }
    .reg-perm-add:hover { border-color: #2563eb; color: #2563eb; background: #eff6ff; }

    /* 권한 부여 모달 */
    .grant-backdrop {
      position: fixed; inset: 0; background: rgba(15,23,42,.45);
      z-index: 1000; display: flex; align-items: center;
      justify-content: center; padding: 16px;
    }
    .grant-modal {
      background: #fff; border-radius: 16px;
      box-shadow: 0 20px 60px rgba(15,23,42,.18);
      width: 100%; max-width: 420px; overflow: hidden;
    }
    .grant-modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 22px 16px; border-bottom: 1px solid var(--border-soft);
    }
    .grant-modal-title { font-size: 15px; font-weight: 800; color: var(--text-primary); }
    .grant-modal-close {
      background: none; border: none; cursor: pointer;
      font-size: 20px; color: var(--text-muted); padding: 4px 8px;
      border-radius: 8px; line-height: 1; font-family: inherit;
    }
    .grant-modal-close:hover { background: #f1f5f9; }
    .grant-modal-body { padding: 20px 22px; display: flex; flex-direction: column; gap: 14px; }
    .grant-label { font-size: 13px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
    .grant-modal-footer {
      display: flex; justify-content: center; gap: 10px;
      padding: 14px 22px; border-top: 1px solid var(--border-soft); background: #f8fafc;
    }

    @media (max-width: 600px) {
      .reg-grid { grid-template-columns: 1fr; }
      .reg-card-meta { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="portal-page">
  <div class="container page-shell">

    <!-- 공통 topbar -->
    <section class="top-brand-bar portal-hero-card">
      <div class="top-brand-left">
        <div class="top-brand-logo">📚</div>
        <div class="top-brand-texts">
          <strong class="top-brand-title">규정 및 가이드라인</strong>
          <span class="top-brand-sub">열람 권한이 있는 규정을 확인하세요</span>
        </div>
      </div>
      <div class="top-brand-actions">
        <a href="../../portal.html" class="portal-header-btn portal-header-btn--secondary">HOME</a>
      </div>
    </section>

    <div style="padding: 24px 0 60px;">

      <!-- 규정 목록 -->
      <div class="reg-section-label">규정 목록</div>
      <div class="reg-grid" id="regGrid">
        <div class="reg-skeleton-card"></div>
        <div class="reg-skeleton-card"></div>
      </div>
      <div class="reg-empty" id="regEmpty" style="display:none;">
        열람 권한이 있는 규정 및 가이드라인이 없습니다.
      </div>

      <!-- 편집 권한 관리 (regulation admin만) -->
      <div class="reg-perm-section" id="permSection" style="display:none;">
        <div class="reg-perm-header">
          <div class="reg-perm-title">🔐 규정별 편집 권한 관리</div>
          <div class="reg-perm-desc">규정별로 편집·배포 권한을 부여할 사용자를 지정합니다.</div>
        </div>
        <table class="reg-perm-table">
          <thead>
            <tr>
              <th style="width:200px;">규정명</th>
              <th>편집 권한 사용자</th>
            </tr>
          </thead>
          <tbody id="permTableBody">
            <tr><td colspan="2" style="text-align:center;color:#94a3b8;padding:20px;">불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

  <!-- 권한 부여 모달 -->
  <div class="grant-backdrop" id="grantModal" style="display:none;">
    <div class="grant-modal">
      <div class="grant-modal-head">
        <span class="grant-modal-title" id="grantModalTitle">편집 권한 부여</span>
        <button class="grant-modal-close" onclick="closeGrantModal()">✕</button>
      </div>
      <div class="grant-modal-body">
        <div>
          <div class="grant-label">사용자 선택</div>
          <select id="grantUserSelect" class="input" style="width:100%;"></select>
        </div>
      </div>
      <div class="grant-modal-footer">
        <button class="btn btn-primary" onclick="submitGrant()" style="min-width:100px;">권한 부여</button>
        <button class="btn" onclick="closeGrantModal()" style="min-width:100px;">취소</button>
      </div>
    </div>
  </div>

  <script src="../../assets/js/core/config.js"></script>
  <script src="../../assets/js/core/auth.js"></script>
  <script src="../../assets/js/core/api.js"></script>
  <script src="../../assets/js/core/utils.js"></script>
  <script src="../../assets/js/core/app-permission.js"></script>
  <script>
  // ── 규정 목록 정의 (새 규정 추가 시 여기만 수정) ─────────────────
  const REGULATION_LIST = [
    {
      app_id:    'procurement',
      edit_perm: 'procurement_edit',
      title:     '구매규정',
      desc:      'GC녹십자아이메드 구매규정 조회',
      icon:      '📋',
      url:       '../../pages/procurement/procurement.html'
    }
  ];

  let currentEditPerm = '';
  let allUsers        = [];
  let currentUser     = null;
  let isRegAdmin      = false;

  (async function () {
    const user = window.auth?.requireAuth?.();
    if (!user) return;
    currentUser = user;

    const grid    = document.getElementById('regGrid');
    const emptyEl = document.getElementById('regEmpty');

    try {
      showGlobalLoading('불러오는 중...');

      const isGlobalAdmin = String(user.role || '').toLowerCase() === 'admin';
      const regPerm = await window.appPermission?.getPermission?.('regulation');
      isRegAdmin = isGlobalAdmin || regPerm === 'admin';

      // ── 규정별 최신 배포 정보 조회 (procurement API 활용) ──────
      const cards = await Promise.all(REGULATION_LIST.map(async reg => {
        let versionLabel = '-';
        let effectiveDate = '-';
        let deployedAt = '-';
        let deployedBy = '-';

        try {
          const vResult = await apiGet('getProcurementVersionList', {
            request_user_email: user.email
          });
          const latest = (vResult?.data || [])[0];
          if (latest) {
            versionLabel  = latest.version_label || '-';
            effectiveDate = latest.effective_date ? formatDateSimple(latest.effective_date) : '-';
            deployedAt    = latest.snapshot_at   ? formatDateSimple(latest.snapshot_at)    : '-';
            deployedBy    = latest.created_by    ? latest.created_by.split('@')[0]         : '-';
          }
        } catch(e) {}

        return { reg, versionLabel, effectiveDate, deployedAt, deployedBy };
      }));

      // ── 카드 렌더링 ────────────────────────────────────────────
      if (cards.length === 0) {
        grid.innerHTML = '';
        emptyEl.style.display = '';
      } else {
        grid.innerHTML = cards.map(({ reg, versionLabel, effectiveDate, deployedAt, deployedBy }) => `
          <a class="reg-card" href="${escapeHtml(reg.url)}">
            <div class="reg-card-head">
              <span class="reg-card-icon">${escapeHtml(reg.icon)}</span>
              <div>
                <div class="reg-card-title">${escapeHtml(reg.title)}</div>
                <div class="reg-card-desc">${escapeHtml(reg.desc)}</div>
              </div>
            </div>
            <div class="reg-card-meta">
              <div class="reg-meta-item">
                <span class="reg-meta-label">버전</span>
                <span class="reg-meta-value">
                  ${versionLabel !== '-'
                    ? `<span class="reg-meta-value--badge">${escapeHtml(versionLabel)}</span>`
                    : '<span class="reg-meta-value--muted">미배포</span>'}
                </span>
              </div>
              <div class="reg-meta-item">
                <span class="reg-meta-label">시행일</span>
                <span class="reg-meta-value ${effectiveDate === '-' ? 'reg-meta-value--muted' : ''}">${escapeHtml(effectiveDate)}</span>
              </div>
              <div class="reg-meta-item">
                <span class="reg-meta-label">배포일시</span>
                <span class="reg-meta-value ${deployedAt === '-' ? 'reg-meta-value--muted' : ''}">${escapeHtml(deployedAt)}</span>
              </div>
              <div class="reg-meta-item">
                <span class="reg-meta-label">배포자</span>
                <span class="reg-meta-value ${deployedBy === '-' ? 'reg-meta-value--muted' : ''}">${escapeHtml(deployedBy)}</span>
              </div>
            </div>
          </a>
        `).join('');
      }

      // ── 편집 권한 관리 섹션 (admin만) ─────────────────────────
      if (isRegAdmin) {
        document.getElementById('permSection').style.display = '';
        await loadPermSection();
      }

    } catch (e) {
      grid.innerHTML = `<div style="color:#dc2626;font-size:14px;padding:20px;">${escapeHtml(e.message || '오류가 발생했습니다.')}</div>`;
    } finally {
      hideGlobalLoading();
    }
  })();

  // 날짜 포맷 헬퍼
  function formatDateSimple(str) {
    if (!str) return '-';
    const m = str.match(/(\d{4})[.\-](\d{2})[.\-](\d{2})/);
    if (m) return `${m[1]}.${m[2]}.${m[3]}`;
    try {
      const d = new Date(str);
      if (!isNaN(d)) return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
    } catch(e) {}
    return str;
  }

  // ── 편집 권한 관리 ─────────────────────────────────────────────
  async function loadPermSection() {
    const tbody = document.getElementById('permTableBody');
    try {
      // global admin만 listUsers 가능 — 아니면 빈 배열로 폴백
      try {
        const uResult = await apiGet('listUsers', { request_user_email: currentUser.email });
        allUsers = (uResult?.data || []).filter(u => String(u.active || 'Y').toUpperCase() === 'Y');
      } catch(e) {
        allUsers = [];
      }

      // 각 규정의 편집 권한 보유자 조회
      // setUserPermission_ 에서 regulation admin도 허용했으므로
      // 각 사용자 권한 조회는 global admin만 가능 → 편집자 목록은 직접 API 추가 필요
      // 현재는 global admin일 때만 보여주는 방식으로 우선 처리
      const isGlobalAdmin = String(currentUser.role || '').toLowerCase() === 'admin';

      const rowsHtml = await Promise.all(REGULATION_LIST.map(async reg => {
        let editorHtml = '<span style="font-size:12px;color:#94a3b8;">편집 권한자 없음</span>';

        if (isGlobalAdmin && allUsers.length > 0) {
          const editors = [];
          for (const u of allUsers) {
            try {
              const pResult = await apiGet('getUserPermissions', {
                user_email: u.user_email,
                request_user_email: currentUser.email
              });
              const hasEdit = (pResult?.data || []).some(p => p.app_id === reg.edit_perm && p.permission === 'admin');
              if (hasEdit) editors.push(u);
            } catch(e) {}
          }

          if (editors.length > 0) {
            editorHtml = editors.map(u => `
              <div class="reg-perm-user-item">
                <span class="reg-perm-user-email">${escapeHtml(u.user_name || '')} (${escapeHtml(u.user_email)})</span>
                <span class="reg-perm-badge">편집</span>
                <button class="reg-perm-remove" onclick="removeEditPerm('${escapeHtml(reg.edit_perm)}','${escapeHtml(u.user_email)}')" title="권한 제거">✕</button>
              </div>`).join('');
          }
        } else if (!isGlobalAdmin) {
          editorHtml = '<span style="font-size:12px;color:#94a3b8;">전체 관리자만 조회 가능</span>';
        }

        return `
          <tr>
            <td>
              <div class="reg-perm-app-row">
                <span class="reg-perm-app-icon">${escapeHtml(reg.icon)}</span>
                <div>
                  <div style="font-weight:700;">${escapeHtml(reg.title)}</div>
                  <div style="font-size:11px;color:#94a3b8;margin-top:2px;">${escapeHtml(reg.edit_perm)}</div>
                </div>
              </div>
            </td>
            <td>
              <div class="reg-perm-user-list" id="editorList_${escapeHtml(reg.edit_perm)}">${editorHtml}</div>
              <button class="reg-perm-add" onclick="openGrantModal('${escapeHtml(reg.edit_perm)}','${escapeHtml(reg.title)}')">+ 권한 부여</button>
            </td>
          </tr>`;
      }));

      tbody.innerHTML = rowsHtml.join('');
    } catch(e) {
      tbody.innerHTML = `<tr><td colspan="2" style="color:#dc2626;padding:16px;">${escapeHtml(e.message)}</td></tr>`;
    }
  }

  // ── 권한 부여 모달 ─────────────────────────────────────────────
  function openGrantModal(editPerm, regTitle) {
    currentEditPerm = editPerm;
    document.getElementById('grantModalTitle').textContent = `${regTitle} — 편집 권한 부여`;
    const sel = document.getElementById('grantUserSelect');
    sel.innerHTML = '<option value="">사용자를 선택하세요</option>' +
      allUsers.map(u =>
        `<option value="${escapeHtml(u.user_email)}">${escapeHtml(u.user_name || u.user_email)} (${escapeHtml(u.user_email)})</option>`
      ).join('');
    document.getElementById('grantModal').style.display = 'flex';
  }

  function closeGrantModal() {
    document.getElementById('grantModal').style.display = 'none';
    currentEditPerm = '';
  }

  async function submitGrant() {
    const targetEmail = document.getElementById('grantUserSelect').value;
    if (!targetEmail) { alert('사용자를 선택하세요.'); return; }
    try {
      showGlobalLoading('권한 부여 중...');
      await apiPost('setUserPermission', {
        request_user_email: currentUser.email,
        target_user_email:  targetEmail,
        app_id:             currentEditPerm,
        permission:         'admin'
      });
      closeGrantModal();
      await loadPermSection();
      showMessage('권한이 부여되었습니다.', 'success');
    } catch(e) {
      showMessage(e.message || '권한 부여에 실패했습니다.', 'error');
    } finally {
      hideGlobalLoading();
    }
  }

  async function removeEditPerm(editPerm, targetEmail) {
    if (!confirm(`${targetEmail}의 편집 권한을 제거하시겠습니까?`)) return;
    try {
      showGlobalLoading('권한 제거 중...');
      await apiPost('setUserPermission', {
        request_user_email: currentUser.email,
        target_user_email:  targetEmail,
        app_id:             editPerm,
        permission:         ''
      });
      await loadPermSection();
      showMessage('권한이 제거되었습니다.', 'success');
    } catch(e) {
      showMessage(e.message || '권한 제거에 실패했습니다.', 'error');
    } finally {
      hideGlobalLoading();
    }
  }
  </script>
</body>
</html>
