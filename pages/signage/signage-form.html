<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>사인물 신청</title>

  <link rel="stylesheet" href="../../assets/css/common.css">
  <link rel="stylesheet" href="../../assets/css/portal.css">
  <link rel="stylesheet" href="../../assets/css/equipment.css">

  <script src="../../assets/js/config.js"></script>
</head>

<body class="portal-page-compact">

  <div class="portal-container">

    <!-- 헤더 -->
    <div class="portal-header">
      <div class="portal-header-title">사인물 신청</div>
    </div>

    <!-- 카드 영역 -->
    <div class="portal-card">

      <!-- 1. 제작 종류 -->
      <div class="form-section">
        <div class="form-title">제작 종류 선택</div>

        <label><input type="radio" name="type" value="SIGN"> 일반 사인물</label>
        <label><input type="radio" name="type" value="NAMEPLATE"> 규격 명판</label>
      </div>

      <!-- 공통 -->
      <div class="form-section">
        <div class="form-title">기본 정보</div>

        <div class="form-row">
          <input id="requester_name" placeholder="요청자">
          <input id="contact" placeholder="연락처">
        </div>

        <div class="form-row">
          <input id="clinic_code" placeholder="의원코드">
          <input id="team_code" placeholder="팀코드">
        </div>

        <div class="form-row">
          <input id="quantity" placeholder="수량" type="number">
          <input id="text_content" placeholder="문구">
        </div>

        <div class="form-row">
          <select id="is_urgent">
            <option value="N">일반</option>
            <option value="Y">긴급</option>
          </select>
          <input id="urgent_reason" placeholder="긴급 사유">
        </div>

        <div class="form-row">
          <input type="file" id="file_main" multiple>
        </div>
      </div>

      <!-- 사인물 -->
      <div id="section_sign" class="form-section" style="display:none;">
        <div class="form-title">일반 사인물</div>

        <input id="sign_size" placeholder="사이즈 (가로x세로x폭)">
        <input id="sign_type" placeholder="형태/종류">
        <input id="install_location" placeholder="설치 위치">

        <select id="install_env">
          <option value="">환경 선택</option>
          <option value="INDOOR">실내</option>
          <option value="OUTDOOR">실외</option>
        </select>

        <input type="file" id="file_location" multiple>
        <input type="file" id="file_reference" multiple>
      </div>

      <!-- 명판 -->
      <div id="section_nameplate" class="form-section" style="display:none;">
        <div class="form-title">규격 명판</div>

        <select id="nameplate_type">
          <option value="">타입 선택</option>
          <option value="A">A 타입</option>
          <option value="B">B 타입</option>
          <option value="C">C 타입</option>
          <option value="D">D 타입</option>
        </select>

        <input id="nameplate_text" placeholder="명판 문구">
      </div>

      <!-- 버튼 -->
      <div class="form-actions">
        <button id="submitBtn" class="btn-primary">신청하기</button>
      </div>

    </div>
  </div>

  <script src="../../assets/js/signage/signage-form.js"></script>

</body>
</html>
