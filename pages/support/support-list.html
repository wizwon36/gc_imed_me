<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내 수정요청 - MSO관리팀 업무포털</title>
  <link rel="stylesheet" href="../../assets/css/common.css" />
  <style>
    .form-control-sm {
      height: 38px; padding: 0 12px;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-size: 14px; background: var(--surface); color: var(--text-primary);
    }
    .support-filter-bar {
      display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .support-list { display: flex; flex-direction: column; gap: 10px; }

    /* ── 카드 ── */
    .support-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 0;
      cursor: pointer;
      overflow: hidden;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .support-card:hover {
      border-color: var(--blue);
      box-shadow: 0 4px 16px rgba(47,109,246,0.10);
    }
    /* 상태별 왼쪽 컬러 바 */
    .support-card-bar {
      height: 4px;
      width: 100%;
    }
    .support-card--PENDING     .support-card-bar { background: #f59e0b; }
    .support-card--IN_PROGRESS .support-card-bar { background: #2563eb; }
    .support-card--COMPLETED   .support-card-bar { background: #10b981; }
    .support-card--REJECTED    .support-card-bar { background: #ef4444; }

    .support-card-body { padding: 16px 20px; }

    /* 뱃지 줄 */
    .support-card-badges {
      display: flex; align-items: center; gap: 6px;
      flex-wrap: wrap; margin-bottom: 8px;
    }
    /* 제목 */
    .support-card-title {
      font-size: 15px; font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 6px;
      line-height: 1.4;
    }
    /* 본문 미리보기 */
    .support-card-preview {
      font-size: 13px; color: var(--text-secondary);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      margin-bottom: 10px;
    }
    /* 메타(날짜) */
    .support-card-meta {
      font-size: 12px; color: var(--text-muted);
      display: flex; align-items: center; gap: 6px;
    }
    .support-card-meta-dot { color: var(--border); }

    /* 답변 미리보기 */
    .support-card-reply {
      margin-top: 10px; padding: 10px 14px;
      background: var(--success-bg);
      border-radius: var(--radius-sm);
      border: 1px solid #a7f3d0;
      font-size: 13px; color: var(--success-text);
    }
    .support-card-reply-label {
      font-weight: 700; margin-bottom: 4px; font-size: 12px;
    }

    /* ── 뱃지 ── */
    .support-badge {
      display: inline-flex; align-items: center;
      height: 22px; padding: 0 10px;
      border-radius: 999px;
      font-size: 11px; font-weight: 700; white-space: nowrap;
    }
    .support-badge--app      { background:#f0f4ff; color:#2563eb; border:1px solid #bfdbfe; }
    .support-badge--cat      { background:#f5f3ff; color:#6d28d9; border:1px solid #ddd6fe; }
    .support-badge--PENDING     { background:#fffbeb; color:#92400e; border:1px solid #fde68a; }
    .support-badge--IN_PROGRESS { background:#eff6ff; color:#1d4ed8; border:1px solid #bfdbfe; }
    .support-badge--COMPLETED   { background:#ecfdf5; color:#065f46; border:1px solid #a7f3d0; }
    .support-badge--REJECTED    { background:#fef2f2; color:#991b1b; border:1px solid #fca5a5; }

    /* ── 모달 ── */
    .support-modal { position:fixed; inset:0; z-index:1000; }
    .support-modal-backdrop { position:absolute; inset:0; background:rgba(0,0,0,0.45); }
    .support-modal-box {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 90%; max-width: 560px; max-height: 90vh;
      background: var(--surface);
      border-radius: var(--radius-xl);
      overflow: hidden; display: flex; flex-direction: column;
      box-shadow: 0 24px 64px rgba(0,0,0,0.22);
    }
    /* 모달 상단 컬러 바 */
    .support-modal-topbar {
      height: 5px; width: 100%; flex-shrink: 0;
    }
    .support-modal-topbar--PENDING     { background: linear-gradient(90deg,#f59e0b,#fbbf24); }
    .support-modal-topbar--IN_PROGRESS { background: linear-gradient(90deg,#2563eb,#60a5fa); }
    .support-modal-topbar--COMPLETED   { background: linear-gradient(90deg,#10b981,#34d399); }
    .support-modal-topbar--REJECTED    { background: linear-gradient(90deg,#ef4444,#f87171); }

    .support-modal-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 12px;
      padding: 20px 24px 14px;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .support-modal-header-left { flex: 1; min-width: 0; }
    .support-modal-badges {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px;
    }
    .support-modal-title {
      margin: 0; font-size: 17px; font-weight: 800;
      line-height: 1.4; color: var(--text-primary);
    }
    .support-modal-close {
      background: none; border: none; font-size: 20px;
      cursor: pointer; color: var(--text-muted);
      padding: 0; line-height: 1; flex-shrink: 0; margin-top: 2px;
    }
    .support-modal-close:hover { color: var(--text-primary); }

    .support-modal-body { padding: 20px 24px; overflow-y: auto; }

    /* 모달 섹션 구분 */
    .support-modal-section {
      margin-bottom: 18px;
    }
    .support-modal-section + .support-modal-section {
      padding-top: 18px;
      border-top: 1px solid var(--border-soft);
    }
    .support-detail-label {
      font-size: 11px; font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .support-detail-value {
      font-size: 14px; color: var(--text-primary);
    }
    .support-detail-content {
      background: var(--surface-soft);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      font-size: 14px; line-height: 1.7;
      white-space: pre-wrap; word-break: break-word;
      color: var(--text-primary);
      border: 1px solid var(--border-soft);
    }
    .support-meta-row {
      display: flex; align-items: center; gap: 16px;
      flex-wrap: wrap;
    }
    .support-meta-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; color: var(--text-muted);
    }
    .support-meta-item strong { color: var(--text-secondary); font-weight: 600; }

    /* 답변 박스 */
    .support-reply-box {
      padding: 16px;
      background: var(--success-bg);
      border: 1px solid #a7f3d0;
      border-radius: var(--radius-md);
    }
    .support-reply-box-title {
      font-size: 12px; font-weight: 700;
      color: var(--success-text); margin-bottom: 8px;
      display: flex; align-items: center; gap: 5px;
    }
    .support-reply-box-content {
      font-size: 14px; white-space: pre-wrap;
      color: var(--text-primary); line-height: 1.6;
    }

    /* ── 스켈레톤 ── */
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position:  600px 0; }
    }
    .sk {
      background: linear-gradient(90deg,#f0f2f5 25%,#e4e6ea 50%,#f0f2f5 75%);
      background-size: 600px 100%;
      animation: shimmer 1.4s infinite linear;
      border-radius: 8px;
    }
    .sk-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius-lg); padding: 18px 20px; margin-bottom: 10px;
    }
    .sk-badge-row { display:flex; gap:8px; margin-bottom:10px; }
    .sk-badge  { height:22px; width:64px; border-radius:999px; }
    .sk-title  { height:18px; width:55%; border-radius:6px; margin-bottom:8px; }
    .sk-text   { height:13px; width:80%; border-radius:6px; }
    .sk-text-sm{ height:12px; width:40%; border-radius:6px; margin-top:8px; }
  </style>
</body>
</html>
