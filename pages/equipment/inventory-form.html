<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>재고조사 등록</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <link rel="stylesheet" href="../../assets/css/pages/equipment-form.css">
</head>
<body>
  <div class="container form-shell form-shell-tuned">
    <section class="top-brand-bar">
      <div class="top-brand-left">
        <div class="top-brand-logo">+</div>
        <div class="top-brand-texts">
          <strong class="top-brand-title">의료장비 관리시스템</strong>
          <span class="top-brand-sub">재고조사 · 현장점검 · 위치 확인</span>
        </div>
      </div>

      <div class="top-brand-actions">
        <a class="nav-link" href="dashboard.html">대시보드</a>
        <a class="nav-link" href="list.html">장비목록</a>
      </div>
    </section>

    <section class="form-hero form-hero-tuned">
      <div class="form-hero-copy">
        <div class="form-hero-topline">재고조사 등록</div>
        <h1 class="form-hero-title">현장 점검 결과 입력</h1>
        <div class="form-hero-subtext">
          점검 위치와 상태를 기록해 현장 재고조사 이력을 남깁니다.
        </div>
      </div>
    </section>

    <div id="messageBox" class="message-box"></div>

    <form id="inventoryForm" class="form-page-grid form-page-grid-tuned">
      <section class="card form-main-card form-main-card-tuned">
        <div class="section-head">
          <h2 class="section-title">대상 장비</h2>
          <div class="sub-text">선택된 장비 기준으로 재고조사 기록이 저장됩니다.</div>
        </div>

        <div class="form-grid form-grid-modern">
          <div class="form-group">
            <label class="form-label">장비번호</label>
            <input type="text" id="equipment_id" class="form-input" readonly />
          </div>

          <div class="form-group">
            <label class="form-label">장비명</label>
            <input type="text" id="equipment_name" class="form-input" readonly />
          </div>
        </div>

        <div class="section-head" style="margin-top:20px;">
          <h2 class="section-title">재고조사 정보</h2>
        </div>

        <div class="form-grid form-grid-modern">
          <div class="form-group">
            <label class="form-label">점검일시 <span class="required">*</span></label>
            <input type="text" id="checked_at" class="form-input" />
          </div>

          <div class="form-group">
            <label class="form-label">점검자 <span class="required">*</span></label>
            <input type="text" id="checked_by" class="form-input" />
          </div>

          <div class="form-group">
            <label class="form-label">점검 의원 <span class="required">*</span></label>
            <select id="clinic_code_at_check" class="form-select" disabled>
              <option value="">의원 불러오는 중...</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">점검 팀 <span class="required">*</span></label>
            <select id="team_code_at_check" class="form-select" disabled>
              <option value="">팀 불러오는 중...</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">점검 시점 위치</label>
            <input type="text" id="location_at_check" class="form-input" />
          </div>

          <div class="form-group">
            <label class="form-label">상태 <span class="required">*</span></label>
            <select id="condition_status" class="form-select">
              <option value="NORMAL">정상</option>
              <option value="NEEDS_REPAIR">수리필요</option>
              <option value="LOCATION_MISMATCH">위치불일치</option>
              <option value="MISSING_SUSPECTED">분실의심</option>
              <option value="DISPOSAL_TARGET">폐기대상</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">QR 스캔 여부</label>
            <select id="qr_scan_yn" class="form-select">
              <option value="Y">Y</option>
              <option value="N">N</option>
            </select>
          </div>

          <div class="form-group full">
            <label class="form-label">비고</label>
            <textarea id="memo" class="form-textarea" placeholder="현장 점검 메모를 입력하세요."></textarea>
          </div>
        </div>
      </section>

      <aside class="card form-side-card form-side-card-tuned">
        <div class="section-head">
          <h2 class="section-title">입력 안내</h2>
        </div>

        <div class="guide-list">
          <div class="guide-item">
            <div class="guide-title">필수 입력</div>
            <div class="guide-text">점검일시, 점검자, 점검 의원/팀, 상태는 반드시 입력해야 합니다.</div>
          </div>

          <div class="guide-item">
            <div class="guide-title">현장 정보</div>
            <div class="guide-text">점검 당시 실제 위치와 소속을 기준으로 입력해 주세요.</div>
          </div>

          <div class="guide-item">
            <div class="guide-title">QR 사용</div>
            <div class="guide-text">현장에서 QR 스캔 후 등록했다면 QR 스캔 여부를 Y로 유지하면 됩니다.</div>
          </div>
        </div>
        
        <div class="guide-actions">
          <button type="submit" id="submitBtn" class="btn-save">저장</button>
          <a id="backToDetailBtn" class="btn-back" href="#">상세로 돌아가기</a>
        </div>
      </aside>
    </form>
  </div>

  <script src="../../assets/js/core/config.js"></script>
  <script src="../../assets/js/core/auth.js"></script>
  <script>
    window.auth.requireAuth();
  </script>
  <script src="../../assets/js/core/app-permission.js"></script>
  <script src="../../assets/js/core/api.js"></script>
  <script src="../../assets/js/core/utils.js"></script>
  <script src="../../assets/js/core/org-config.js"></script>
  <script src="../../assets/js/equipment/inventory-form.js"></script>

  <div id="globalLoading" aria-hidden="true">
    <div class="global-loading__dialog">
      <div class="global-loading__spinner" aria-hidden="true"></div>
      <div class="global-loading__text" id="globalLoadingText">불러오는 중...</div>
    </div>
  </div>
</body>
</html>
