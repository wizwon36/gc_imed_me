<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장비 목록</title>
  <link rel="stylesheet" href="../../assets/css/common.css" />
  <link rel="stylesheet" href="../../assets/css/pages/equipment-list.css" />
  <style>
    @media print {
      @page { size: A4 portrait; margin: 0; }

      body > *:not(#printLabelOverlay) { display: none !important; visibility: hidden !important; }
      #printLabelOverlay { display: block !important; visibility: visible !important; position: static !important; margin: 0 !important; padding: 0 !important; }

      .plabel-page { page-break-after: always; break-after: page; }
      .plabel-page:last-child { page-break-after: avoid; break-after: avoid; }
      .plabel-page--grid { display: grid !important; box-sizing: border-box; width: 210mm; }
      .plabel-page--single { display: flex !important; justify-content: center; padding: 20mm 0; }
      .plabel-empty { visibility: hidden; }

      /* 라벨 공통 */
      #printLabelOverlay .device-label {
        display: grid !important; box-sizing: border-box !important;
        border: 0.3mm solid #bbb !important; border-radius: 3mm !important;
        background: white !important; overflow: hidden !important;
        page-break-inside: avoid !important; break-inside: avoid !important;
      }

      /* 90×48mm */
      #printLabelOverlay .size-90x48 {
        width: 90mm !important; height: 48mm !important;
        padding: 3.5mm !important; grid-template-columns: 1fr 22mm !important;
        gap: 3mm !important; align-items: center !important;
      }
      #printLabelOverlay .size-90x48 .label-hospital   { font-size: 6pt !important; line-height: 1.2 !important; margin-bottom: 1.5mm !important; white-space: nowrap !important; overflow: hidden !important; }
      #printLabelOverlay .size-90x48 .label-title      { font-size: 12pt !important; line-height: 1.1 !important; margin: 0 0 1.5mm !important; }
      #printLabelOverlay .size-90x48 .label-info-block { gap: 1.2mm !important; }
      #printLabelOverlay .size-90x48 .label-row        { display: grid !important; grid-template-columns: 12mm 1fr !important; gap: 0.8mm 1.5mm !important; }
      #printLabelOverlay .size-90x48 .label-key        { font-size: 6.5pt !important; white-space: nowrap !important; }
      #printLabelOverlay .size-90x48 .label-value      { font-size: 7pt !important; white-space: nowrap !important; overflow: hidden !important; text-overflow: ellipsis !important; }
      #printLabelOverlay .size-90x48 .label-value-id   { font-size: 9pt !important; white-space: nowrap !important; }
      #printLabelOverlay .size-90x48 .label-qr-box     { width: 20mm !important; height: 20mm !important; min-width: 20mm !important; min-height: 20mm !important; padding: 1mm !important; border-radius: 2mm !important; }
      #printLabelOverlay .size-90x48 .label-qr-box img { width: 18mm !important; height: 18mm !important; }

      /* 70×40mm */
      #printLabelOverlay .size-70x40 {
        width: 70mm !important; height: 40mm !important;
        padding: 2.5mm !important; grid-template-columns: 1fr 16mm !important;
        gap: 2mm !important; align-items: center !important;
      }
      #printLabelOverlay .size-70x40 .label-hospital   { font-size: 5pt !important; line-height: 1.2 !important; margin-bottom: 1mm !important; white-space: nowrap !important; overflow: hidden !important; }
      #printLabelOverlay .size-70x40 .label-title      { font-size: 9pt !important; line-height: 1.1 !important; margin: 0 0 1mm !important; }
      #printLabelOverlay .size-70x40 .label-info-block { gap: 0.8mm !important; }
      #printLabelOverlay .size-70x40 .label-row        { display: grid !important; grid-template-columns: 9mm 1fr !important; gap: 0.6mm 1mm !important; }
      #printLabelOverlay .size-70x40 .label-key        { font-size: 5.5pt !important; white-space: nowrap !important; }
      #printLabelOverlay .size-70x40 .label-value      { font-size: 5.8pt !important; white-space: nowrap !important; overflow: hidden !important; text-overflow: ellipsis !important; }
      #printLabelOverlay .size-70x40 .label-value-id   { font-size: 7pt !important; white-space: nowrap !important; }
      #printLabelOverlay .size-70x40 .label-qr-box     { width: 13mm !important; height: 13mm !important; min-width: 13mm !important; min-height: 13mm !important; padding: 0.8mm !important; border-radius: 1.5mm !important; }
      #printLabelOverlay .size-70x40 .label-qr-box img { width: 11.4mm !important; height: 11.4mm !important; }
    }
  </style>
</head>
<body class="portal-page equipment-list-page">
  <div class="container page-shell">
    <section class="top-brand-bar portal-topbar portal-hero-card equipment-list-topbar">
      <div class="top-brand-left">
        <div class="top-brand-logo">+</div>
        <div class="top-brand-texts">
          <strong class="top-brand-title">의료장비 관리시스템</strong>
          <span class="top-brand-sub">장비 검색 · 상태 · 상세</span>
        </div>
      </div>

      <div class="top-brand-actions portal-top-actions equipment-list-top-actions">
        <a class="portal-header-btn portal-header-btn--secondary" href="../../portal.html">HOME</a>
        <a class="portal-header-btn portal-header-btn--secondary" href="dashboard.html">대시보드</a>
        <a class="portal-header-btn portal-header-btn--primary" id="createEquipmentBtn" href="form.html">장비등록</a>
      </div>
    </section>

    <section class="page-hero-simple">
      <div>
        <h1 class="page-title">장비 목록</h1>
        <p class="page-desc">
          검색 조건 없이 진입하면 최근 등록 장비를 먼저 보여주고, 검색 조건을 입력하면 전체 검색으로 전환됩니다.
        </p>
      </div>
    </section>

    <div id="messageBox" class="message-box"></div>

    <section class="card filter-card">
      <div class="section-head">
        <h2 class="section-title">장비 검색</h2>
        <div class="sub-text" id="listSearchHelp">
          장비번호, 장비명, 모델명, 부서, 상태, 제조사 기준으로 조회할 수 있습니다.
        </div>
      </div>

      <form id="searchForm">
        <div class="form-grid two-col">
          <label class="form-field full-col">
            <span class="form-label">검색어</span>
            <input
              type="text"
              id="keyword"
              class="input"
              placeholder="장비번호, 장비명, 모델명, 시리얼, 부서 등"
            />
          </label>

          <label class="form-field">
            <span class="form-label">의원</span>
            <select id="clinic_code" class="input"></select>
          </label>

          <label class="form-field">
            <span class="form-label">팀</span>
            <select id="team_code" class="input"></select>
          </label>

          <label class="form-field">
            <span class="form-label">상태</span>
            <select id="status" class="input"></select>
          </label>

          <label class="form-field">
            <span class="form-label">제조사</span>
            <input
              type="text"
              id="manufacturer"
              class="input"
              placeholder="제조사명 입력"
            />
          </label>
        </div>

        <div class="filter-actions">
          <div class="filter-actions-left">
            <div class="inline-field">
              <label for="page_size" class="form-label">페이지당 표시</label>
              <select id="page_size" class="input input-sm"></select>
            </div>
          </div>

          <div class="filter-actions-right">
            <button type="submit" class="btn-primary">조회</button>
            <button type="button" class="btn-secondary" id="resetFilterBtn">초기화</button>
            <button type="button" class="btn-secondary" id="exportExcelBtn">엑셀 다운로드</button>
          </div>
        </div>
      </form>
    </section>

    <section class="equipment-list-wrap">
      <div class="equipment-list-toolbar">
        <div class="equipment-list-summary" id="listSummary">최근 등록 장비를 불러오는 중...</div>
        <div class="equipment-list-toolbar-actions">
          <select id="bulkLabelSizeSelect" class="input input--sm" style="display:none;">
            <option value="size-90x48">90 × 48 mm</option>
            <option value="size-70x40">70 × 40 mm</option>
          </select>
          <select id="bulkLayoutSelect" class="input input--sm" style="display:none;">
            <option value="">단일 출력</option>
            <option value="2x5">격자 — 2×5 (10칸)</option>
            <option value="2x4">격자 — 2×4 (8칸)</option>
          </select>
          <button type="button" class="btn btn-sm" id="bulkLabelBtn" style="display:none;">
            🏷️ 라벨 일괄 출력 (<span id="bulkLabelCount">0</span>)
          </button>
          <button type="button" class="btn btn-sm btn-success" id="bulkInspectionCertBtn" style="display:none;">
            📄 검수확인서 (<span id="bulkInspectionCertCount">0</span>)
          </button>
        </div>
      </div>

      <div id="equipmentList" class="equipment-list-grid">
        <div class="empty-box">불러오는 중...</div>
      </div>

      <div id="paginationArea" class="pagination-area"></div>
    </section>
  </div>

  <script src="../../assets/js/core/config.js"></script>
  <script src="../../assets/js/core/api.js"></script>
  <script src="../../assets/js/core/utils.js"></script>
  <script src="../../assets/js/core/auth.js"></script>
  <script src="../../assets/js/core/app-permission.js"></script>
  <script src="../../assets/js/core/org-select.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
  <script src="../../assets/libs/qrcode.min.js"></script>
  <script src="../../assets/js/equipment/inspection-cert.js"></script>
  <script src="../../assets/js/equipment/equipment-list.js"></script>

  <div id="globalLoading" aria-hidden="true">
    <div class="global-loading__dialog">
      <div class="global-loading__spinner" aria-hidden="true"></div>
      <div class="global-loading__text" id="globalLoadingText">불러오는 중...</div>
    </div>
  </div>
</body>
</html>
