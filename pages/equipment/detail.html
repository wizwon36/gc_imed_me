<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장비 상세정보</title>
  <link rel="stylesheet" href="../../assets/css/common.css" />
  <style>
    .detail-hero-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }

    .detail-action-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .detail-action-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .detail-main-grid {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(320px, 1fr);
      gap: 16px;
    }

    .detail-sub-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .qr-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 240px;
      text-align: center;
    }

    .qr-box {
      width: 220px;
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px dashed rgba(18, 34, 66, 0.16);
      border-radius: 18px;
      background: #f8fafc;
      padding: 16px;
      word-break: break-all;
      overflow: hidden;
    }

    .qr-fallback-link {
      font-size: 13px;
      line-height: 1.6;
      color: #334155;
    }

    @media (max-width: 1024px) {
      .detail-main-grid,
      .detail-sub-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .detail-action-bar {
        flex-direction: column;
        align-items: stretch;
      }

      .detail-action-group {
        width: 100%;
      }

      .detail-action-group .btn {
        flex: 1 1 auto;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div class="container page-shell">
    <section class="top-brand-bar">
      <div class="top-brand-left">
        <div class="top-brand-logo">+</div>
        <div class="top-brand-texts">
          <strong class="top-brand-title">의료장비 관리시스템</strong>
          <span class="top-brand-sub">장비 상세정보</span>
        </div>
      </div>

      <div class="top-brand-actions">
        <a class="nav-link" href="../../portal.html">HOME</a>
        <a class="nav-link" href="dashboard.html">대시보드</a>
        <a class="nav-link" href="list.html">장비목록</a>
      </div>
    </section>

    <section class="page-hero-simple">
      <div>
        <h1 class="page-title" id="heroEquipmentName">장비 상세정보</h1>
        <div class="detail-hero-meta">
          <span class="sub-text" id="heroEquipmentId">-</span>
          <span class="status-badge" id="heroStatusBadge">-</span>
        </div>
      </div>
    </section>

    <div id="messageBox" class="message-box"></div>

    <section class="detail-action-bar">
      <div class="detail-action-group">
        <a href="list.html" class="btn">목록으로</a>
        <button type="button" id="printLabelBtn" class="btn" style="display:none;">라벨 출력</button>
      </div>

      <div class="detail-action-group">
        <button type="button" id="addHistoryBtn" class="btn" style="display:none;">이력 등록</button>
        <button type="button" id="addInventoryBtn" class="btn" style="display:none;">재고조사 등록</button>
        <button type="button" id="editEquipmentBtn" class="btn btn-primary" style="display:none;">장비 수정</button>
        <button type="button" id="deleteBtn" class="btn btn-danger" style="display:none;">장비 삭제</button>
      </div>
    </section>

    <section class="detail-main-grid" style="margin-top:16px;">
      <article class="card">
        <div class="section-head">
          <h2 class="section-title">장비 기본 정보</h2>
        </div>
        <div id="detailInfoGrid" class="info-tile-grid">
          <div class="empty-box">불러오는 중...</div>
        </div>
      </article>

      <article class="card">
        <div class="section-head">
          <h2 class="section-title">QR 코드</h2>
        </div>
        <div class="qr-panel">
          <div id="qrBox" class="qr-box">
            <div class="empty-box">불러오는 중...</div>
          </div>
          <div id="qrText" class="sub-text" style="margin-top:12px;">-</div>
        </div>
      </article>
    </section>

    <section class="detail-sub-grid" style="margin-top:16px;">
      <article class="card">
        <div class="section-head">
          <h2 class="section-title">수리 / 점검 이력</h2>
          <div class="sub-text" id="historyCountText">불러오는 중...</div>
        </div>
        <div id="historyArea">
          <div class="empty-box">불러오는 중...</div>
        </div>
      </article>

      <article class="card">
        <div class="section-head">
          <h2 class="section-title">재고조사 이력</h2>
          <div class="sub-text" id="inventoryCountText">불러오는 중...</div>
        </div>
        <div id="inventoryArea">
          <div class="empty-box">불러오는 중...</div>
        </div>
      </article>
    </section>
  </div>

  <script src="../../assets/js/core/config.js"></script>
  <script src="../../assets/js/core/api.js"></script>
  <script src="../../assets/js/core/utils.js"></script>
  <script src="../../assets/js/core/auth.js"></script>
  <script src="../../assets/libs/qrcode.min.js"></script>
  <script src="../../assets/js/equipment/equipment-detail.js"></script>

  <div id="globalLoading" aria-hidden="true">
    <div class="global-loading__dialog">
      <div class="global-loading__spinner" aria-hidden="true"></div>
      <div class="global-loading__text" id="globalLoadingText">불러오는 중...</div>
    </div>
  </div>
</body>
</html>
