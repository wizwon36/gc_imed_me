<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장비 등록/수정</title>
  <link rel="stylesheet" href="../../assets/css/common.css" />
</head>
<body>
  <div class="container page-shell">
    <section class="top-brand-bar">
      <div class="top-brand-left">
        <div class="top-brand-logo">+</div>
        <div class="top-brand-texts">
          <strong class="top-brand-title">의료장비 관리시스템</strong>
          <span class="top-brand-sub">장비 등록 · 수정</span>
        </div>
      </div>

      <div class="top-brand-actions">
        <a class="nav-link" href="../../portal.html">HOME</a>
        <a class="nav-link" href="dashboard.html">대시보드</a>
        <a class="nav-link" href="list.html">장비목록</a>
      </div>
    </section>

    <section class="page-hero-simple">
      <div>
        <h1 class="page-title" id="pageTitle">장비 등록</h1>
        <p class="page-desc" id="pageDesc">신규 의료장비 정보를 등록합니다.</p>
      </div>
    </section>

    <div id="messageBox" class="message-box"></div>

    <form id="equipmentForm" class="card form-card">
      <div class="section-head">
        <h2 class="section-title">기본 정보</h2>
      </div>

      <div class="form-grid two-col">
        <label class="form-field">
          <span class="form-label required">장비명</span>
          <input type="text" id="equipment_name" class="input" required />
        </label>

        <label class="form-field">
          <span class="form-label required">모델명</span>
          <input type="text" id="model_name" class="input" required />
        </label>

        <label class="form-field">
          <span class="form-label required">의원</span>
          <select id="clinic_code" class="input" required></select>
        </label>

        <label class="form-field">
          <span class="form-label required">팀</span>
          <select id="team_code" class="input" required></select>
        </label>

        <label class="form-field full-col">
          <span class="form-label">부서명</span>
          <input
            type="text"
            id="department_preview"
            class="input"
            readonly
            placeholder="의원 / 팀 선택 시 자동 표시"
          />
        </label>

        <label class="form-field">
          <span class="form-label">제조사</span>
          <input type="text" id="manufacturer" class="input" />
        </label>

        <label class="form-field">
          <span class="form-label">제조일자</span>
          <input type="date" id="manufacture_date" class="input" />
        </label>

        <label class="form-field">
          <span class="form-label">취득일자</span>
          <input type="date" id="purchase_date" class="input" />
        </label>

        <label class="form-field">
          <span class="form-label required">시리얼번호</span>
          <input type="text" id="serial_no" class="input" required />
        </label>

        <label class="form-field">
          <span class="form-label">구매처</span>
          <input type="text" id="vendor" class="input" />
        </label>

        <label class="form-field">
          <span class="form-label">취득가액</span>
          <input type="number" id="acquisition_cost" class="input" />
        </label>

        <label class="form-field">
          <span class="form-label">담당자</span>
          <input type="text" id="manager_name" class="input" />
        </label>

        <label class="form-field">
          <span class="form-label">담당자 연락처</span>
          <input type="text" id="manager_phone" class="input" />
        </label>

        <label class="form-field">
          <span class="form-label">유지보수 종료일</span>
          <input type="date" id="maintenance_end_date" class="input" />
        </label>

        <label class="form-field">
          <span class="form-label">상태</span>
          <select id="status" class="input"></select>
        </label>

        <label class="form-field">
          <span class="form-label">위치</span>
          <input type="text" id="location" class="input" />
        </label>

        <label class="form-field">
          <span class="form-label">현재 사용자</span>
          <input type="text" id="current_user" class="input" />
        </label>

        <label class="form-field full-col">
          <span class="form-label">메모</span>
          <textarea id="memo" class="textarea" rows="5"></textarea>
        </label>
      </div>

      <div class="form-actions">
        <a href="list.html" class="btn">목록으로</a>
        <button type="submit" id="submitButton" class="btn btn-primary">
          <span id="submitButtonText">장비 등록</span>
        </button>
      </div>
    </form>
  </div>

  <script src="../../assets/js/core/config.js"></script>
  <script src="../../assets/js/core/api.js"></script>
  <script src="../../assets/js/core/utils.js"></script>
  <script src="../../assets/js/core/auth.js"></script>
  <script src="../../assets/js/core/org-config.js"></script>
  <script src="../../assets/js/equipment/equipment-form.js"></script>

  <div id="globalLoading" aria-hidden="true">
    <div class="global-loading__dialog">
      <div class="global-loading__spinner" aria-hidden="true"></div>
      <div class="global-loading__text" id="globalLoadingText">불러오는 중...</div>
    </div>
  </div>
</body>
</html>
