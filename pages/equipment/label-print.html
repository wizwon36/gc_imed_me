<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장비 라벨 출력</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <link rel="stylesheet" href="../../assets/css/pages/equipment-detail.css">
</head>
<body class="portal-page equipment-label-page">
  <div class="container label-shell">
    <section class="top-brand-bar portal-topbar portal-hero-card no-print equipment-label-topbar">
      <div class="top-brand-left">
        <div class="top-brand-logo">+</div>
        <div class="top-brand-texts">
          <strong class="top-brand-title">의료장비 관리시스템</strong>
          <span class="top-brand-sub">QR 라벨 출력 · 장비 식별표 인쇄</span>
        </div>
      </div>

      <div class="top-brand-actions equipment-label-top-actions">
        <a class="portal-header-btn portal-header-btn--secondary" id="backToDetailBtn" href="#">상세로 돌아가기</a>
        <button class="portal-header-btn portal-header-btn--primary" id="printBtn" type="button">인쇄</button>
      </div>
    </section>

    <section class="label-hero no-print">
      <div class="label-hero-copy">
        <div class="label-hero-topline">장비 라벨 출력</div>
        <h1 class="label-hero-title">QR 포함 장비 라벨</h1>
        <div class="label-hero-subtext">
          장비 식별용 라벨을 미리보고 바로 인쇄할 수 있습니다.
        </div>
      </div>
    </section>

    <div id="messageBox" class="message-box"></div>

    <section class="label-preview-wrap">
      <article class="card label-preview-card">
        <div class="section-head no-print">
          <h2 class="section-title">라벨 미리보기</h2>
          <div class="sub-text">출력 전에 장비명, 관리번호, QR 정보를 확인하세요.</div>
        </div>

        <div class="label-sheet">
          <div class="device-label" id="deviceLabel">
            <div class="device-label-main">
              <div class="label-hospital" id="hospitalName">의료장비 관리시스템</div>
              <div class="label-title" id="labelEquipmentName">-</div>

              <div class="label-info-block">
                <div class="label-row">
                  <div class="label-key">관리번호</div>
                  <div class="label-value" id="labelEquipmentId">-</div>
                </div>

                <div class="label-row">
                  <div class="label-key">모델명</div>
                  <div class="label-value" id="labelModelName">-</div>
                </div>

                <div class="label-row">
                  <div class="label-key">사용부서</div>
                  <div class="label-value" id="labelDepartment">-</div>
                </div>

                <div class="label-row">
                  <div class="label-key">위치</div>
                  <div class="label-value" id="labelLocation">-</div>
                </div>

                <div class="label-row">
                  <div class="label-key">상태</div>
                  <div class="label-value" id="labelStatus">-</div>
                </div>
              </div>
            </div>

            <div class="qr-panel">
              <div id="labelQr" class="label-qr-box"></div>
            </div>
          </div>
        </div>
      </article>
    </section>
  </div>

  <script src="../../assets/js/core/config.js"></script>
  <script src="../../assets/js/core/auth.js"></script>
  <script>
    window.auth.requireAuth();
  </script>
  <script src="../../assets/js/core/app-permission.js"></script>
  <script src="../../assets/js/core/api.js"></script>
  <script src="../../assets/js/core/utils.js"></script>
  <script src="../../assets/libs/qrcode.min.js"></script>
  <script src="../../assets/js/equipment/label-print.js"></script>

  <div id="globalLoading" aria-hidden="true">
    <div class="global-loading__dialog">
      <div class="global-loading__spinner" aria-hidden="true"></div>
      <div class="global-loading__text" id="globalLoadingText">불러오는 중...</div>
    </div>
  </div>
</body>
</html>
