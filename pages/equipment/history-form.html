<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>이력 등록</title>

  <link rel="stylesheet" href="../../assets/css/common.css" />
  <link rel="stylesheet" href="../../assets/css/pages/equipment-form.css" />
</head>

<body class="portal-page equipment-form-page">
  <div class="container page-shell">

    <!-- 상단 -->
    <section class="top-brand-bar portal-topbar portal-hero-card">
      <div class="top-brand-left">
        <div class="top-brand-logo">+</div>
        <div class="top-brand-texts">
          <strong class="top-brand-title">의료장비 관리시스템</strong>
          <span class="top-brand-sub">수리 / 점검 이력 등록</span>
        </div>
      </div>

      <div class="top-brand-actions">
        <a class="portal-header-btn portal-header-btn--secondary" href="../../portal.html">HOME</a>
        <a class="portal-header-btn portal-header-btn--secondary" href="dashboard.html">대시보드</a>
        <a class="portal-header-btn portal-header-btn--secondary" href="list.html">장비목록</a>
      </div>
    </section>

    <!-- 타이틀 -->
    <section class="page-hero-simple">
      <div>
        <h1 class="page-title">이력 등록</h1>
        <p class="page-desc">수리 및 점검 이력을 기록합니다.</p>
      </div>
    </section>

    <div id="messageBox" class="message-box"></div>

    <!-- 폼 -->
    <form id="historyForm" class="card form-card">
      <div class="section-head">
        <h2 class="section-title">이력 정보</h2>
      </div>

      <div class="form-grid two-col">

        <label class="form-field">
          <span class="form-label required">이력 유형</span>
          <select id="history_type" class="input" required></select>
        </label>

        <label class="form-field">
          <span class="form-label required">발생일</span>
          <input type="date" id="history_date" class="input" required />
        </label>

        <label class="form-field">
          <span class="form-label">비용</span>
          <input type="number" id="cost" class="input" />
        </label>

        <label class="form-field">
          <span class="form-label">처리자</span>
          <input type="text" id="operator" class="input" />
        </label>

        <label class="form-field full-col">
          <span class="form-label">내용</span>
          <textarea id="description" class="textarea"></textarea>
        </label>

      </div>
      
      <div class="form-actions">
        <a href="#" id="backToDetailBtn" class="btn">상세로 돌아가기</a>
        <button type="submit" class="btn btn-primary">저장</button>
      </div>
    </form>
  </div>
  
  <script src="../../assets/js/core/config.js"></script>
  <script src="../../assets/js/core/api.js"></script>
  <script src="../../assets/js/core/utils.js"></script>
  <script src="../../assets/js/core/auth.js"></script>
  <script src="../../assets/js/core/app-permission.js"></script>
  <script src="../../assets/js/core/org-config.js"></script>
  <script src="../../assets/js/equipment/history-form.js"></script>
</body>
</html>
