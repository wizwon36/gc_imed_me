<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장비 라벨 출력</title>
  <link rel="stylesheet" href="assets/css/common.css" />
  <style>
    .print-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .label-sheet {
      display: flex;
      justify-content: center;
      margin-top: 24px;
    }

    .device-label {
      width: 420px;
      min-height: 260px;
      background: #fff;
      border: 2px solid #111827;
      border-radius: 16px;
      padding: 18px;
      display: grid;
      grid-template-columns: 1fr 150px;
      gap: 16px;
      align-items: center;
    }

    .label-hospital {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .label-title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 12px;
      word-break: break-word;
    }

    .label-row {
      display: grid;
      grid-template-columns: 86px 1fr;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .label-key {
      font-weight: 700;
      color: #374151;
    }

    .label-value {
      word-break: break-word;
    }

    .qr-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .qr-caption {
      font-size: 12px;
      color: #6b7280;
      text-align: center;
      word-break: break-all;
    }

    @media print {
      body {
        background: #fff;
      }

      .no-print {
        display: none !important;
      }

      .print-wrap {
        max-width: none;
        padding: 0;
      }

      .device-label {
        width: 90mm;
        min-height: 55mm;
        border-radius: 6mm;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <div class="print-wrap">
    <div class="header no-print">
      <div>
        <h1 class="page-title">장비 라벨 출력</h1>
        <div class="sub-text">QR 포함 라벨을 바로 인쇄할 수 있습니다.</div>
      </div>
      <div class="nav-links">
        <a class="nav-link" id="backToDetailBtn" href="#">상세로 돌아가기</a>
        <button class="btn btn-primary" id="printBtn">인쇄</button>
      </div>
    </div>

    <div id="messageBox" class="message-box"></div>

    <div class="label-sheet">
      <div class="device-label" id="deviceLabel">
        <div>
          <div class="label-hospital" id="hospitalName">의료장비 관리시스템</div>
          <div class="label-title" id="labelEquipmentName">-</div>

          <div class="label-row">
            <div class="label-key">관리번호</div>
            <div class="label-value" id="labelEquipmentId">-</div>
          </div>

          <div class="label-row">
            <div class="label-key">모델명</div>
            <div class="label-value" id="labelModelName">-</div>
          </div>

          <div class="label-row">
            <div class="label-key">사용부서</div>
            <div class="label-value" id="labelDepartment">-</div>
          </div>

          <div class="label-row">
            <div class="label-key">위치</div>
            <div class="label-value" id="labelLocation">-</div>
          </div>

          <div class="label-row">
            <div class="label-key">상태</div>
            <div class="label-value" id="labelStatus">-</div>
          </div>
        </div>

        <div class="qr-panel">
          <div id="labelQr"></div>
          <div class="qr-caption" id="labelQrCaption"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/libs/qrcode.min.js"></script>
  <script src="assets/js/label-print.js"></script>
</body>
</html>
