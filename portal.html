<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MSO관리팀 업무포털</title>
  <link rel="stylesheet" href="./assets/css/common.css" />
</head>
<body>
  <div class="container page-shell portal-page">
    <section class="top-brand-bar portal-topbar">
      <div class="top-brand-left">
        <div class="top-brand-logo">+</div>
        <div class="top-brand-texts">
          <strong class="top-brand-title">의료장비 관리시스템</strong>
          <span class="top-brand-sub">앱 선택 · 권한 기반 포털</span>
        </div>
      </div>

      <div class="top-brand-actions portal-top-actions">
        <button
          type="button"
          id="adminPageBtn"
          class="portal-header-btn portal-header-btn--primary"
          style="display:none;">
          관리자 페이지
        </button>

        <button
          type="button"
          id="logoutBtn"
          class="portal-header-btn portal-header-btn--secondary"
        >
          로그아웃
        </button>
      </div>
    </section>

    <section class="page-hero-simple portal-hero">
      <div>
        <h1 class="page-title">앱 선택</h1>
        <p class="page-desc">권한에 맞는 시스템을 선택해 이용할 수 있습니다.</p>
      </div>

      <div class="portal-user-box">
        <div class="portal-user-name" id="portalUserName">사용자</div>
        <div class="portal-user-sub" id="portalUserSub">소속 없음 / user</div>
      </div>
    </section>

    <section class="portal-section">
      <div class="section-head">
        <h2 class="section-title">사용 가능한 앱</h2>
        <div class="sub-text">접근 권한이 있는 앱만 표시됩니다.</div>
      </div>

      <div id="portalAppGrid" class="portal-app-grid"></div>

      <div id="portalEmpty" class="empty-box" style="display:none;">
        사용 가능한 앱이 없습니다.
      </div>
    </section>
  </div>

  <script src="./assets/js/core/config.js"></script>
  <script src="./assets/js/core/api.js"></script>
  <script src="./assets/js/core/utils.js"></script>
  <script src="./assets/js/core/auth.js"></script>
  <script src="./assets/js/core/app-permission.js"></script>
  <script src="./assets/js/portal/portal.js"></script>

  <div id="globalLoading" aria-hidden="true">
    <div class="global-loading__dialog">
      <div class="global-loading__spinner" aria-hidden="true"></div>
      <div class="global-loading__text" id="globalLoadingText">불러오는 중...</div>
    </div>
  </div>
</body>
</html>
