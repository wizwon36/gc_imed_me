<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>앱 선택</title>
  <link rel="stylesheet" href="assets/css/common.css">
  <style>
    body.portal-page {
      min-height: 100vh;
      margin: 0;
      background: #f3f6fb;
    }
  
    .portal-shell {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 20px 40px;
    }
  
    .portal-hero {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      padding: 20px 20px 18px;
      border-radius: 24px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
      margin-bottom: 24px;
    }
  
    .portal-hero-copy h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.3;
      letter-spacing: -0.02em;
      color: #0f172a;
    }
  
    .portal-hero-copy p {
      margin: 0;
      font-size: 14px;
      line-height: 1.6;
      color: #64748b;
    }
  
    .portal-user-box {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
  
    .portal-user-meta {
      text-align: right;
    }
  
    .portal-user-name {
      margin: 0 0 4px;
      font-size: 16px;
      font-weight: 800;
      color: #0f172a;
    }
  
    .portal-user-sub {
      margin: 0;
      font-size: 13px;
      color: #64748b;
    }
  
    .portal-logout-btn {
      min-width: 88px;
      height: 42px;
      padding: 0 16px;
      border-radius: 14px;
      border: 1px solid #cbd5e1;
      background: #ffffff;
      color: #0f172a;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
  
    .portal-section {
      margin-top: 8px;
    }
  
    .portal-section-title {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.35;
      font-weight: 800;
      color: #0f172a;
      letter-spacing: -0.02em;
    }
  
    .portal-section-desc {
      margin: 0 0 18px;
      font-size: 14px;
      line-height: 1.55;
      color: #64748b;
    }
  
    .portal-app-grid {
      display: grid !important;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)) !important;
      gap: 16px !important;
      align-items: stretch;
    }
  
    .portal-app-card {
      width: 100% !important;
      max-width: 480px !important;
      display: flex !important;
      flex-direction: column !important;
      gap: 12px !important;
      min-height: 180px !important;
      padding: 16px !important;
      border-radius: 24px !important;
      background: #ffffff !important;
      border: 1px solid #e5e7eb !important;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06) !important;
      text-decoration: none !important;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }
  
    .portal-app-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 32px rgba(15, 23, 42, 0.10);
      border-color: #cbd5e1;
    }
  
    .portal-app-icon {
      width: 52px !important;
      height: 52px !important;
      border-radius: 16px !important;
      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;
      font-size: 24px !important;
      line-height: 1 !important;
      color: #ffffff !important;
      background: linear-gradient(135deg, #2563eb, #22c55e) !important;
      flex-shrink: 0;
    }
  
    .portal-app-body {
      display: flex !important;
      flex-direction: column !important;
      gap: 6px !important;
    }
  
    .portal-app-title {
      margin: 0 !important;
      font-size: 17px !important;
      line-height: 1.35 !important;
      font-weight: 800 !important;
      color: #0f172a !important;
      letter-spacing: -0.02em;
    }
  
    .portal-app-desc {
      margin: 0 !important;
      font-size: 13px !important;
      line-height: 1.55 !important;
      color: #64748b !important;
    }
  
    .portal-app-footer {
      margin-top: auto !important;
      display: flex !important;
      align-items: center !important;
    }
  
    .portal-app-permission {
      display: inline-flex !important;
      align-items: center !important;
      min-height: 32px !important;
      padding: 0 12px !important;
      border-radius: 999px !important;
      background: #eff6ff !important;
      color: #2563eb !important;
      font-size: 13px !important;
      font-weight: 700 !important;
      letter-spacing: -0.01em;
    }
  
    .portal-empty {
      padding: 20px;
      border-radius: 20px;
      background: #ffffff;
      border: 1px dashed #cbd5e1;
      color: #64748b;
      font-size: 14px;
    }
  
    .portal-error {
      padding: 16px 18px;
      border-radius: 16px;
      background: #fff1f2;
      border: 1px solid #fecdd3;
      color: #be123c;
      font-size: 14px;
      line-height: 1.5;
    }
  
    @media (max-width: 768px) {
      .portal-shell {
        padding: 20px 16px 32px;
      }
  
      .portal-hero {
        flex-direction: column;
        align-items: stretch;
        gap: 16px;
        padding: 18px;
      }
  
      .portal-user-box {
        justify-content: space-between;
        width: 100%;
      }
  
      .portal-user-meta {
        text-align: left;
      }
  
      .portal-app-grid {
        grid-template-columns: 1fr !important;
        gap: 14px !important;
      }
  
      .portal-app-card {
        max-width: none !important;
        min-height: 170px !important;
        padding: 16px !important;
      }
    }
  </style>
</head>
  
<body class="portal-page">
  <main class="portal-shell">
    <section class="portal-topbar">
      <div>
        <h1 class="portal-title">앱 선택</h1>
        <p class="portal-desc">권한에 맞는 시스템을 선택해 이용할 수 있습니다.</p>
      </div>

      <div class="portal-user-box">
        <div class="portal-user-meta">
          <span class="portal-user-name" id="portalUserName">사용자</span>
          <span class="portal-user-sub" id="portalUserSub">부서 / 권한</span>
        </div>
        <button type="button" class="portal-logout-btn" id="logoutBtn">로그아웃</button>
      </div>
    </section>

    <section class="portal-section">
      <h2 class="portal-section-title">사용 가능한 앱</h2>
      <p class="portal-section-desc">접근 권한이 있는 앱만 표시됩니다.</p>

      <div class="portal-grid" id="portalAppGrid"></div>
      <div class="portal-empty" id="portalEmpty" style="display:none;">
        현재 접근 가능한 앱이 없습니다.
      </div>
    </section>
  </main>
  
  <div id="globalLoading" aria-hidden="true">
  <div class="global-loading__dialog">
    <div class="global-loading__spinner" aria-hidden="true"></div>
    <div class="global-loading__text" id="globalLoadingText">로딩 중...</div>
  </div>
</div>
  
<script src="assets/js/core/config.js"></script>
<script src="assets/js/core/api.js"></script>
<script src="assets/js/core/auth.js"></script>
<script>
  window.auth.requireAuth();
</script>
<script src="assets/js/portal/portal.js"></script>

</body>
</html>
