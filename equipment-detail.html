<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장비 상세</title>
  <link rel="stylesheet" href="assets/css/common.css" />
</head>
<body>
  <div class="container detail-shell">
    <div class="detail-hero">
      <div class="detail-hero-copy">
        <div class="detail-hero-topline">의료장비 상세정보</div>
        <h1 class="detail-hero-title" id="heroEquipmentName">장비명</h1>
        <div class="detail-hero-meta">
          <span class="status-badge" id="heroStatusBadge">상태</span>
          <span class="detail-hero-id" id="heroEquipmentId">관리번호</span>
        </div>
      </div>

      <div class="detail-hero-actions">
        <a class="nav-link" href="index.html">홈</a>
        <a class="nav-link" href="equipment-list.html">장비목록</a>
        <a class="nav-link btn-primary" href="equipment-form.html">장비등록</a>
      </div>
    </div>

    <div id="messageBox" class="message-box"></div>

    <section class="detail-action-bar card">
      <div class="form-actions detail-action-buttons">
        <button class="btn" id="editEquipmentBtn">장비 수정</button>
        <button class="btn" id="addHistoryBtn">이력 등록</button>
        <button class="btn" id="addInventoryBtn">재고조사 등록</button>
        <button class="btn" id="printLabelBtn">라벨 출력</button>
        <button class="btn btn-danger" id="deleteBtn">장비 삭제</button>
      </div>
    </section>

    <section class="detail-main-grid">
      <article class="card detail-info-card">
        <div class="section-head">
          <h2 class="section-title">기본정보</h2>
          <div class="sub-text">장비의 기본 속성과 현재 상태를 확인할 수 있습니다.</div>
        </div>

        <div id="detailInfoGrid" class="detail-info-grid"></div>
      </article>

      <aside class="card detail-qr-card">
        <div class="section-head">
          <h2 class="section-title">QR 코드</h2>
          <div class="sub-text">현장에서 스캔하면 장비 상세 페이지로 이동합니다.</div>
        </div>

        <div class="detail-qr-box" id="qrBox"></div>
        <div class="detail-qr-url" id="qrText"></div>
      </aside>
    </section>

    <section class="detail-history-section">
      <div class="detail-section-grid">
        <article class="card detail-list-card">
          <div class="section-head">
            <h2 class="section-title">수리/점검 이력</h2>
            <div class="sub-text" id="historyCountText">0건</div>
          </div>
          <div id="historyArea" class="detail-timeline-list"></div>
        </article>

        <article class="card detail-list-card">
          <div class="section-head">
            <h2 class="section-title">재고조사 이력</h2>
            <div class="sub-text" id="inventoryCountText">0건</div>
          </div>
          <div id="inventoryArea" class="detail-timeline-list"></div>
        </article>
      </div>
    </section>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/libs/qrcode.min.js"></script>
  <script src="assets/js/equipment-detail.js"></script>
</body>
</html>
