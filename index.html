<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>의료장비 관리시스템</title>
  <link rel="stylesheet" href="assets/css/common.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1 class="page-title">의료장비 관리시스템</h1>
        <div class="sub-text">장비 등록, 조회, 이력 관리 MVP</div>
      </div>
      <div class="nav-links">
        <a class="nav-link" href="equipment-list.html">장비목록</a>
        <a class="nav-link btn-primary" href="equipment-form.html">장비등록</a>
      </div>
    </div>

    <div id="messageBox" class="message-box"></div>

    <div class="kpi-grid" id="kpiGrid">
      <div class="kpi-card">
        <div class="kpi-label">전체 장비</div>
        <div class="kpi-value" id="totalCount">-</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">사용중</div>
        <div class="kpi-value" id="inUseCount">-</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">수리중</div>
        <div class="kpi-value" id="repairingCount">-</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">점검중</div>
        <div class="kpi-value" id="inspectingCount">-</div>
      </div>
    </div>

    <div style="height: 20px;"></div>

    <div class="card">
      <h2 class="section-title">바로가기</h2>
      <div class="form-actions">
        <a class="btn btn-primary" href="equipment-form.html">장비 등록</a>
        <a class="btn" href="equipment-list.html">장비 목록 조회</a>
      </div>
    </div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/utils.js"></script>
  <script>
    async function loadDashboard() {
      try {
        const result = await apiGet('listEquipments');
        const items = result.data || [];

        const total = items.length;
        const inUse = items.filter(item => item.status === 'IN_USE').length;
        const repairing = items.filter(item => item.status === 'REPAIRING').length;
        const inspecting = items.filter(item => item.status === 'INSPECTING').length;

        qs('#totalCount').textContent = formatNumber(total);
        qs('#inUseCount').textContent = formatNumber(inUse);
        qs('#repairingCount').textContent = formatNumber(repairing);
        qs('#inspectingCount').textContent = formatNumber(inspecting);
      } catch (error) {
        showMessage(error.message, 'error');
      }
    }

    loadDashboard();
  </script>
</body>
</html>
